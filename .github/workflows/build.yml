name: Build

on:
  push:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to build and publish"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.tag || '' }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      commit: ${{ steps.metadata.outputs.COMMIT }}
      date: ${{ steps.metadata.outputs.DATE }}
      checkout_ref: ${{ steps.version.outputs.CHECKOUT_REF }}
      is_release: ${{ steps.version.outputs.IS_RELEASE }}
      release_tag: ${{ steps.version.outputs.RELEASE_TAG }}
      release_url: ${{ steps.version.outputs.RELEASE_URL }}
      skip_run: ${{ steps.duplicate.outputs.SKIP_RUN }}
    steps:
      - name: Resolve build version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
            CHECKOUT_REF="${{ inputs.tag }}"
            IS_RELEASE="true"
            RELEASE_TAG="${{ inputs.tag }}"
            RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            CHECKOUT_REF="${{ github.ref_name }}"
            IS_RELEASE="true"
            RELEASE_TAG="${{ github.ref_name }}"
            RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          else
            COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
            DATE=$(TZ=Asia/Shanghai date +%Y%m%d)
            VERSION="v${DATE}-${COMMIT}"
            CHECKOUT_REF="${{ github.sha }}"
            IS_RELEASE="false"
            RELEASE_TAG=""
            RELEASE_URL=""
          fi

          {
            echo "VERSION=${VERSION}"
            echo "CHECKOUT_REF=${CHECKOUT_REF}"
            echo "IS_RELEASE=${IS_RELEASE}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
            echo "RELEASE_URL=${RELEASE_URL}"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.CHECKOUT_REF }}
          fetch-depth: 0

      - name: Resolve build metadata
        id: metadata
        run: |
          {
            echo "COMMIT=$(git rev-parse --short HEAD)"
            echo "DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Detect duplicate branch/tag push
        id: duplicate
        run: |
          SKIP_RUN="false"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "branch" ]; then
            if git tag --points-at "${{ github.sha }}" | grep -q .; then
              SKIP_RUN="true"
              echo "A tag points at this branch push commit; the tag workflow run will build and publish it."
            fi
          fi

          echo "SKIP_RUN=${SKIP_RUN}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: ${{ steps.duplicate.outputs.SKIP_RUN != 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Run checks
        if: ${{ steps.duplicate.outputs.SKIP_RUN != 'true' }}
        run: make check

      - name: Run tests
        if: ${{ steps.duplicate.outputs.SKIP_RUN != 'true' }}
        run: make test

  build:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ needs.test.outputs.skip_run != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: windows
            goarch: arm64
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.test.outputs.checkout_ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.test.outputs.version }}
          COMMIT: ${{ needs.test.outputs.commit }}
          DATE: ${{ needs.test.outputs.date }}
        run: |
          output="pvectl-${VERSION}-${GOOS}-${GOARCH}${{ matrix.suffix }}"
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o "${output}" ./main.go
          sha256sum "${output}" > "${output}.sha256"

      - name: Upload release artifact
        if: ${{ needs.test.outputs.is_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pvectl-${{ needs.test.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            pvectl-${{ needs.test.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
            pvectl-${{ needs.test.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}.sha256
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: ${{ needs.test.outputs.is_release == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.test.outputs.checkout_ref }}

      - name: Extract release notes from changelog
        env:
          TAG: ${{ needs.test.outputs.release_tag }}
        run: |
          awk -v tag="$TAG" '
            BEGIN { found = 0 }
            /^## / {
              if (found) {
                exit
              }
              heading = $0
              sub(/^##[[:space:]]+/, "", heading)
              split(heading, parts, /[[:space:]]+/)
              if (parts[1] == tag) {
                found = 1
                next
              }
            }
            found {
              print
            }
            END {
              if (!found) {
                exit 1
              }
            }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "CHANGELOG.md section for ${TAG} is empty or missing" >&2
            exit 1
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.test.outputs.release_tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
          fi
          gh release upload "$TAG" release-assets/* --clobber

  publish_homebrew:
    runs-on: ubuntu-latest
    needs: [test, publish]
    if: ${{ needs.test.outputs.is_release == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.test.outputs.checkout_ref }}

      - name: Clone Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN secret is required to update lz-wang/homebrew-tap" >&2
            exit 1
          fi
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/lz-wang/homebrew-tap.git" homebrew-tap

      - name: Update pvectl formula
        env:
          TAG: ${{ needs.test.outputs.release_tag }}
        run: scripts/update-homebrew-formula.sh "$TAG" homebrew-tap

      - name: Commit and push formula
        working-directory: homebrew-tap
        env:
          TAG: ${{ needs.test.outputs.release_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/pvectl.rb
          if git diff --cached --quiet; then
            echo "Formula/pvectl.rb is already up to date for ${TAG}."
            exit 0
          fi
          git commit -m "Update pvectl to ${TAG}"
          git push

  notify:
    runs-on: ubuntu-latest
    needs: [test, build, publish, publish_homebrew]
    if: ${{ always() && needs.test.outputs.skip_run != 'true' }}
    steps:
      - name: Notify via Pushover
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: |
          MESSAGE=$(cat <<'EOF'
          <b>pvectl 构建通知</b>
          <u>测试结果</u>: ${{ needs.test.result == 'success' && '<font color="#00aa00"><b>success</b></font>' || format('<font color="#cc0000"><b>{0}</b></font>', needs.test.result) }}
          <u>构建结果</u>: ${{ needs.build.result == 'success' && '<font color="#00aa00"><b>success</b></font>' || format('<font color="#cc0000"><b>{0}</b></font>', needs.build.result) }}
          <u>发布结果</u>: ${{ needs.publish.result == 'success' && '<font color="#00aa00"><b>success</b></font>' || format('<font color="#666666"><b>{0}</b></font>', needs.publish.result) }}
          <u>Homebrew结果</u>: ${{ needs.publish_homebrew.result == 'success' && '<font color="#00aa00"><b>success</b></font>' || format('<font color="#666666"><b>{0}</b></font>', needs.publish_homebrew.result) }}
          <u>版本</u>: <font color="#0000ff">${{ needs.test.outputs.version || github.ref_name || inputs.tag }}</font>
          <u>触发人</u>: <i>${{ github.actor }}</i>
          ${{ needs.test.outputs.release_url && format('<a href="{0}">查看 Release</a>', needs.test.outputs.release_url) || '' }}
          <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">查看运行详情</a>
          EOF
          )
          curl -fsS https://api.pushover.net/1/messages.json \
            --data-urlencode "token=${PUSHOVER_TOKEN}" \
            --data-urlencode "user=${PUSHOVER_USER}" \
            --data-urlencode "title=pvectl 构建通知" \
            --data-urlencode "html=1" \
            --data-urlencode "message=${MESSAGE}"
